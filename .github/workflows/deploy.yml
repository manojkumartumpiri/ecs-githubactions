name: Deploy ECS

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  ECR_REPOSITORY: day15
  ECS_CLUSTER: dev-ecs-cluster
  ECS_SERVICE: dev-ecs-cluster-service
  AWS_REGION: ap-southeast-2

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t day15:latest .

      - name: Tag Image
        run: |
          docker tag day15:latest \
          ${{ steps.login-ecr.outputs.registry }}/day15:latest
          

      - name: Push Image
        run: |
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/day15:latest

      - name: Force ECS Deployment
        run: |
          aws ecs update-service \
          --cluster dev-ecs-cluster \
          --service dev-ecs-cluster-service \
          --force-new-deployment